<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - GOD Services</title>
  <script type="module" crossorigin src="/assets/workerDashboard-DkfrJ96B.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-Y_Z3Ykzz.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-B1OcZys5.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container flex-between">
            <div class="navbar-brand">GOD SERVICES</div>
            <ul class="navbar-nav">
                <li><a href="/worker/dashboard.html" class="nav-link active">Dashboard</a></li>
                <li><a href="/worker/jobs.html" class="nav-link">Jobs</a></li>
                <li><a href="/worker/profile.html" class="nav-link">Profile</a></li>
                <li><button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container" style="padding: var(--spacing-xl) var(--spacing-md);">

        <!-- Welcome Section -->
        <section class="welcome-section flex-between">
            <div>
                <h1>Welcome, <span id="workerName">Worker</span></h1>
                <p class="text-secondary" id="workerSkill">Service Provider</p>
            </div>

            <!-- Availability Toggle -->
            <div class="availability-control">
                <label class="toggle">
                    <input type="checkbox" id="availabilityToggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="availability-label" id="availabilityLabel">Set Available</span>
            </div>
        </section>

        <!-- Approval Status (if not approved) -->
        <div id="approvalAlert" class="alert alert-warning mt-lg hidden">
            <strong>⏳ Pending Approval:</strong> Your account is awaiting admin approval. You'll be notified once
            approved.
        </div>

        <!-- Quick Stats -->
        <section class="stats-section grid grid-4 gap-md mt-lg">
            <div class="stat-card">
                <div class="stat-value" id="pendingJobs">0</div>
                <div class="stat-label">Pending Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeJobs">0</div>
                <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedJobs">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalEarnings">₹0</div>
                <div class="stat-label">Total Earnings</div>
            </div>
        </section>

        <!-- Pending Job Requests -->
        <section class="jobs-section mt-xl">
            <h2>Pending Job Requests</h2>
            <div id="pendingJobsContainer" class="mt-md">
                <!-- Pending jobs will be loaded dynamically -->
            </div>
        </section>

        <!-- Today's Schedule -->
        <section class="schedule-section mt-xl">
            <h2>Today's Schedule</h2>
            <div id="scheduleContainer" class="mt-md">
                <!-- Schedule will be loaded dynamically -->
            </div>
        </section>



    </main>

    <style>
        .welcome-section {
            margin-bottom: var(--spacing-lg);
        }

        .welcome-section h1 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-xs);
        }

        .welcome-section h1 span {
            color: var(--color-accent-primary);
        }

        .availability-control {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .availability-label {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .availability-label.active {
            color: var(--color-success);
        }

        .stat-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            /* Generous padding */
            text-align: center;
            transition: transform var(--transition-fast);
        }

        .jobs-section {
            margin-top: var(--spacing-xxl);
        }

        .schedule-section {
            margin-top: var(--spacing-xxl);
        }

        .jobs-section h2,
        .schedule-section h2 {
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-sm);
            border-bottom: 2px solid var(--color-border);
        }

        .job-request-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-left: 4px solid var(--color-accent-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            transition: all var(--transition-fast);
        }

        .job-request-card:hover {
            box-shadow: var(--shadow-md);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: var(--spacing-md);
        }

        .job-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text-primary);
            text-transform: uppercase;
            margin-bottom: var(--spacing-xs);
        }

        .job-time {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .job-details {
            margin-bottom: var(--spacing-md);
        }

        .detail-item {
            padding: var(--spacing-xs) 0;
            font-size: 0.95rem;
        }

        .detail-item strong {
            color: var(--color-text-secondary);
            margin-right: var(--spacing-xs);
        }

        .detail-item span {
            color: var(--color-text-primary);
        }

        .job-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .schedule-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .schedule-time {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-accent-primary);
        }

        .schedule-details {
            flex: 1;
            margin: 0 var(--spacing-md);
        }

        .schedule-service {
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .schedule-location {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
            opacity: 1;
        }



        @media (max-width: 768px) {
            .navbar-nav {
                display: none;
            }

            .welcome-section {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }

            .job-actions {
                flex-direction: column;
            }

            .schedule-item {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-sm);
            }
        }
    </style>


    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>


</body>

</html>
