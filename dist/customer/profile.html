<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - GOD Services</title>
  <script type="module" crossorigin src="/assets/customerProfile-8c8R0CxC.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-Y_Z3Ykzz.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-B1OcZys5.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container flex-between">
            <div class="navbar-brand">GOD SERVICES</div>
            <ul class="navbar-nav">
                <li><a href="/customer/dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="/customer/services.html" class="nav-link">Services</a></li>
                <li><a href="/customer/history.html" class="nav-link">My Bookings</a></li>
                <li><a href="/customer/profile.html" class="nav-link active">Profile</a></li>
                <li><button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container" style="padding: var(--spacing-xl) var(--spacing-md);">

        <!-- Header -->
        <section class="profile-header">
            <div class="profile-avatar" id="avatarInitial">C</div>
            <div>
                <h1 id="profileName">My Profile</h1>
                <p class="text-secondary">Manage your personal information</p>
            </div>
        </section>

        <!-- Profile Form -->
        <section class="profile-card mt-xl">
            <div class="profile-card-header">
                <h2>Personal Details</h2>
                <button class="btn btn-ghost btn-sm" id="editToggle" onclick="toggleEdit()">✏️ Edit</button>
            </div>

            <form id="profileForm">
                <!-- Name -->
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Your full name" disabled>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" disabled>
                    <p class="form-hint">Email is linked to your account and cannot be changed here</p>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+91 XXXXXXXXXX" disabled>
                </div>

                <!-- Address -->
                <div class="form-group">
                    <label class="form-label" for="address">Address</label>
                    <textarea id="address" class="form-textarea" placeholder="Enter your full address" rows="3"
                        disabled></textarea>
                </div>

                <!-- Pincode -->
                <div class="form-group">
                    <label class="form-label" for="pincode">Pincode</label>
                    <input type="text" id="pincode" class="form-input" placeholder="e.g., 110001" pattern="[0-9]{6}"
                        maxlength="6" disabled>
                </div>

                <!-- Save Button (hidden by default) -->
                <div class="profile-actions hidden" id="saveActions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
                </div>
            </form>
        </section>

        <!-- Account Info -->
        <section class="profile-card mt-lg">
            <div class="profile-card-header">
                <h2>Account Info</h2>
            </div>
            <div class="account-info-grid">
                <div class="account-info-item">
                    <strong>Member Since</strong>
                    <span id="memberSince">—</span>
                </div>
                <div class="account-info-item">
                    <strong>Total Bookings</strong>
                    <span id="totalBookings">0</span>
                </div>
                <div class="account-info-item">
                    <strong>Total Spent</strong>
                    <span id="totalSpent">₹0</span>
                </div>
                <div class="account-info-item">
                    <strong>Account Status</strong>
                    <span class="badge badge-success">Active</span>
                </div>
            </div>
        </section>

    </main>

    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .profile-header h1 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-xs);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-hover, #d97706));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.3);
        }

        .profile-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
        }

        .profile-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            padding-bottom: var(--spacing-md);
            border-bottom: 2px solid var(--color-border);
        }

        .profile-card-header h2 {
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-input:disabled,
        .form-textarea:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: var(--color-bg-elevated);
        }

        .form-input:not(:disabled),
        .form-textarea:not(:disabled) {
            border-color: var(--color-accent-primary);
            box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.1);
        }

        .form-hint {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-top: var(--spacing-xs);
        }

        .profile-actions {
            display: flex;
            gap: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }

        .account-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-lg);
        }

        .account-info-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .account-info-item strong {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
        }

        .account-info-item span {
            font-size: 1.1rem;
            color: var(--color-text-primary);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .navbar-nav {
                display: none;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-header h1 {
                font-size: 1.8rem;
            }

            .account-info-grid {
                grid-template-columns: 1fr;
            }

            .profile-actions {
                flex-direction: column;
            }
        }
    </style>


    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>


</body>

</html>
