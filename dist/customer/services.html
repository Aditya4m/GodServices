<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Services - GOD Services</title>
  <script type="module" crossorigin src="/assets/customerServices-DTCZpd6G.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-Y_Z3Ykzz.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-B1OcZys5.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container flex-between">
            <div class="navbar-brand">GOD SERVICES</div>
            <ul class="navbar-nav">
                <li><a href="/customer/dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="/customer/services.html" class="nav-link active">Services</a></li>
                <li><a href="/customer/history.html" class="nav-link">My Bookings</a></li>
                <li><a href="/customer/profile.html" class="nav-link">Profile</a></li>
                <li><button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container" style="padding: var(--spacing-xl) var(--spacing-md);">

        <!-- Header -->
        <section class="page-header">
            <h1>Available Workers</h1>
            <p class="text-secondary" id="categoryName">Browse verified service workers in your area</p>
        </section>

        <!-- Filters -->
        <section class="filters-section card mt-lg">
            <div class="grid grid-2 gap-md">
                <div class="form-group">
                    <label class="form-label" for="categoryFilter">Service Category</label>
                    <select id="categoryFilter" class="form-select">
                        <option value="">All Categories</option>
                        <option value="plumber">Plumber</option>
                        <option value="electrician">Electrician</option>
                        <option value="ac-technician">AC Technician</option>
                        <option value="carpenter">Carpenter</option>
                        <option value="painter">Painter</option>
                        <option value="cleaner">Cleaner</option>
                        <option value="gardener">Gardener</option>
                        <option value="mechanic">Mechanic</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pincodeFilter">Pincode</label>
                    <input type="text" id="pincodeFilter" class="form-input" placeholder="Enter pincode">
                </div>
            </div>

            <button class="btn btn-primary mt-md" id="applyFiltersBtn">Apply Filters</button>
        </section>

        <!-- Workers Grid -->
        <section class="workers-section mt-lg">
            <div class="grid grid-3 gap-lg" id="workersGrid">
                <!-- Workers will be loaded dynamically -->
            </div>

            <div id="emptyState" class="hidden">
                <div class="empty-state">
                    <div class="empty-state-icon">👷</div>
                    <p>No workers found matching your criteria.</p>
                    <button class="btn btn-ghost mt-md" onclick="window.location.reload()">Reset Filters</button>
                </div>
            </div>
        </section>

    </main>

    <style>
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-xs);
        }

        .filters-section {
            padding: var(--spacing-lg);
        }

        .worker-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .worker-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--color-accent-primary), transparent);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .worker-card:hover {
            border-color: var(--color-accent-primary);
            box-shadow: var(--glow-orange);
            transform: translateY(-4px);
        }

        .worker-card:hover::before {
            opacity: 1;
        }

        .worker-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            /* background: #ffffff; */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(255, 165, 0, 0.3);
        }

        .worker-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: var(--spacing-md);
        }

        .worker-info h3 {
            font-size: 1.5rem;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .worker-category {
            font-size: 0.9rem;
            color: var(--color-accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .worker-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-success);
            box-shadow: 0 0 10px var(--color-success);
        }

        .status-indicator.busy {
            background: var(--color-error);
            box-shadow: 0 0 10px var(--color-error);
        }

        .worker-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm) 0;
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-accent-primary);
            white-space: nowrap;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .worker-details {
            margin-bottom: var(--spacing-md);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-xs) 0;
            font-size: 0.9rem;
        }

        .detail-label {
            color: var(--color-text-secondary);
        }

        .detail-value {
            color: var(--color-text-primary);
            font-weight: 600;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .star {
            color: #ffa500;
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-xxl);
            color: var(--color-text-muted);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: var(--spacing-md);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .navbar-nav {
                display: none;
            }

            .worker-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Portfolio Gallery - Collapsed by default, expands on hover */
        .portfolio-section {
            margin-top: var(--spacing-sm);
            border-top: 1px solid var(--color-border);
            padding-top: var(--spacing-sm);
        }

        .portfolio-label {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: var(--spacing-xs);
        }

        .portfolio-collapsed {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 36px;
            overflow: hidden;
        }

        .portfolio-collapsed .mini-thumb {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .portfolio-collapsed .more-badge {
            font-size: 0.75rem;
            color: var(--color-accent-primary);
            font-weight: 600;
            white-space: nowrap;
        }

        .portfolio-expanded {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
            margin-top: 0;
        }

        .worker-card:hover .portfolio-expanded {
            max-height: 800px;
            opacity: 1;
            margin-top: var(--spacing-sm);
        }

        .worker-card:hover .portfolio-collapsed {
            display: none;
        }

        .portfolio-expanded .port-thumb {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .portfolio-expanded .port-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .portfolio-expanded .port-thumb:hover img {
            transform: scale(1.1);
        }
    </style>


    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>


</body>

</html>
