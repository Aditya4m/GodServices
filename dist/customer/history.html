<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - GOD Services</title>
  <script type="module" crossorigin src="/assets/customerHistory-eswaN1Vt.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/theme-Y_Z3Ykzz.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-B1OcZys5.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container flex-between">
            <div class="navbar-brand">GOD SERVICES</div>
            <ul class="navbar-nav">
                <li><a href="/customer/dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="/customer/services.html" class="nav-link">Services</a></li>
                <li><a href="/customer/history.html" class="nav-link active">My Bookings</a></li>
                <li><a href="/customer/profile.html" class="nav-link">Profile</a></li>
                <li><button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container" style="padding: var(--spacing-xl) var(--spacing-md);">

        <!-- Header -->
        <section class="page-header mb-lg">
            <h1>My Bookings</h1>
            <p class="text-secondary">Track and manage your service requests</p>
        </section>

        <!-- Filters -->
        <section class="filters-section mb-lg">
            <div class="filter-tabs">
                <button class="filter-tab active" data-status="all">All</button>
                <button class="filter-tab" data-status="pending">Pending</button>
                <button class="filter-tab" data-status="accepted">Accepted</button>
                <button class="filter-tab" data-status="completed">Completed</button>
            </div>
        </section>

        <!-- Bookings List -->
        <section class="bookings-list" id="bookingsList">
            <!-- Bookings loaded here -->
        </section>

        <div id="emptyState" class="hidden">
            <div class="empty-state">
                <div class="empty-state-icon">📅</div>
                <p>No bookings found.</p>
                <a href="/customer/services.html" class="btn btn-primary mt-md">Book a Service</a>
            </div>
        </div>

    </main>

    <!-- Rating Modal -->
    <div class="modal-overlay" id="ratingModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Rate This Worker</h3>
                <button class="modal-close" id="closeRatingModal">&times;</button>
            </div>
            <div class="modal-body">
                <p class="text-secondary" style="text-align:center;margin-bottom:var(--spacing-lg);">How was your
                    experience?</p>
                <div class="star-rating" id="starRating">
                    <span class="star-btn" data-value="1">☆</span>
                    <span class="star-btn" data-value="2">☆</span>
                    <span class="star-btn" data-value="3">☆</span>
                    <span class="star-btn" data-value="4">☆</span>
                    <span class="star-btn" data-value="5">☆</span>
                </div>
                <p class="rating-label" id="ratingLabel">Select a rating</p>
                <button class="btn btn-primary btn-block mt-lg" id="submitRatingBtn" disabled>Submit Rating</button>
            </div>
        </div>
    </div>

    <style>
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-xs);
        }

        .filter-tabs {
            display: flex;
            gap: var(--spacing-sm);
            overflow-x: auto;
            padding-bottom: var(--spacing-xs);
            border-bottom: 1px solid var(--color-border);
        }

        .filter-tab {
            background: none;
            border: none;
            padding: var(--spacing-sm) var(--spacing-md);
            cursor: pointer;
            color: var(--color-text-secondary);
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .filter-tab:hover {
            color: var(--color-text-primary);
        }

        .filter-tab.active {
            color: var(--color-accent-primary);
            border-bottom-color: var(--color-accent-primary);
        }

        .booking-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            transition: all var(--transition-fast);
        }

        .booking-card:hover {
            border-color: var(--color-accent-primary);
            transform: translateY(-2px);
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .booking-service {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .booking-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
        }

        .detail-item label {
            display: block;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            margin-bottom: 0.25rem;
        }

        .detail-item span {
            font-weight: 500;
            color: var(--color-text-primary);
        }

        .payment-status-paid {
            color: var(--color-success);
        }

        .payment-status-pending {
            color: var(--color-warning);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-xxl);
            color: var(--color-text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
        }

        .rate-btn {
            margin-top: var(--spacing-md);
            background: transparent;
            border: 1px solid var(--color-accent-primary);
            color: var(--color-accent-primary);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .rate-btn:hover {
            background: var(--color-accent-primary);
            color: var(--color-bg-primary);
        }

        .rated-display {
            margin-top: var(--spacing-md);
            font-size: 1.1rem;
            color: var(--color-accent-primary);
            font-weight: 600;
        }

        .star-rating {
            display: flex;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .star-btn {
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--color-text-muted);
            transition: color var(--transition-fast), transform var(--transition-fast);
            user-select: none;
        }

        .star-btn:hover {
            transform: scale(1.2);
        }

        .star-btn.active {
            color: var(--color-accent-primary);
        }

        .rating-label {
            text-align: center;
            margin-top: var(--spacing-sm);
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .navbar-nav {
                display: none;
            }
        }
    </style>


    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>


</body>

</html>
